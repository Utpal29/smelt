<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smelt</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <span id="title">smelt</span>
        <span id="selected-label"></span>
      </header>
      <div id="stage">
        <canvas id="canvas"></canvas>
      </div>
      <div id="ui">
        <div id="palette"></div>
        <div id="controls">
          <label>Brush <input id="brush" type="range" min="1" max="20" value="5" /><span id="brush-val">5</span></label>
          <button id="pause">Pause</button>
          <button id="clear">Clear</button>
          <span id="fps"></span>
        </div>
        <div id="hint">1–8 materials &middot; 0 eraser &middot; space pause &middot; c clear</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
