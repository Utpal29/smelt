<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smelt</title>
    <meta
      name="description"
      content="Smelt is a browser-based falling sand simulator where materials react, burn, flow, grow, explode, and save as shareable scenes."
    />
    <meta name="theme-color" content="#07080c" />
    <meta property="og:title" content="Smelt" />
    <meta property="og:description" content="A reactive falling sand simulator built for the browser." />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div id="brand">
          <div id="brand-title">
            <span id="title">smelt</span>
            <span id="subtitle">element forge</span>
          </div>
          <p id="tagline">A reactive falling-sand forge for fire, water, plants, lava, powder, and chain reactions.</p>
        </div>
        <div id="status-strip">
          <span class="status-pill">active <strong id="selected-label"></strong></span>
          <span class="status-pill" id="fps"></span>
        </div>
      </header>
      <div id="stage">
        <canvas id="canvas"></canvas>
      </div>
      <div id="ui">
        <div id="controls">
          <label id="brush-control">
            <span>Brush</span>
            <input id="brush" type="range" min="1" max="20" value="5" />
            <span id="brush-val">5</span>
          </label>
          <div id="action-row">
            <button id="pause">Pause</button>
            <button id="clear">Clear</button>
            <button id="mute" class="icon-btn" aria-label="Mute sound" aria-pressed="false" title="Mute sound"></button>
          </div>
          <div id="scene-row">
            <select id="preset" aria-label="Preset scene">
              <option value="">Preset</option>
            </select>
            <button id="load-scene">Load</button>
            <button id="save-scene">Save</button>
            <input id="scene-file" type="file" accept="image/png" hidden />
          </div>
        </div>
        <div id="palette"></div>
        <div id="hint">1-9 materials &middot; q mud &middot; e gunpowder &middot; 0 eraser &middot; space pause &middot; c clear &middot; m mute</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
